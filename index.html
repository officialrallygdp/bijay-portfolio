<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durga Puja Dance Competition</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Segoe UI, sans-serif;
    margin:0;
    padding:20px;
}

form{
    max-width:500px;
    margin:auto;
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    color:#ffd700;
    font-size:16px;
}

input, select{
    width:100%;
    padding:10px;
    border-radius:5px;
    border:none;
    outline:none;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#25D366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#fff;
    color:#000;
    transition:0.3s;
}

.card:hover,
.info-box:hover{
    transform:translateY(-5px);
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,215,0,0.3);
}

html{
    scroll-behavior:smooth;
}

.whatsapp-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#25D366;
    color:white;
    font-size:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    text-decoration:none;
    box-shadow:0 0 15px rgba(0,0,0,.3);
    z-index:999;
}

footer{
    text-align:center;
    margin-top:40px;
    color:#ffd700;
}

img{
    width:100%;
    margin-top:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<form>
    <label><b>👤 Participant Name / অংশগ্রহণকারীর নাম</b></label>
    <input type="text" placeholder="Participant Name" required>

    <label><b>📱 Mobile Number / মোবাইল নম্বর</b></label>
    <input type="tel" placeholder="Mobile Number" required>

    <label><b>🎂 Age / বয়স</b></label>
    <input type="number" placeholder="Age" required>

    <label><b>💃 Dance Category</b></label>
    <select required>
        <option>Solo Dance</option>
        <option>Group Dance</option>
        <option>Kids Dance</option>
        <option>Folk Dance</option>
    </select>

    <label><b>📷 Participant Photo / অংশগ্রহণকারীর ছবি</b></label>
    <input type="file" accept="image/*">

    <label><b>💰 Payment Screenshot / পেমেন্ট স্ক্রিনশট</b></label>
    <input type="file" accept="image/*">

    <button type="submit">🎉 Submit Registration</button>
</form>

<a href="https://wa.me/919267988960" class="whatsapp-btn">💬</a>

<footer>
    <h3>🏵️ Shorbo Jonin Durga Puja Samiti</h3>
    <p>Durga Puja Dance Competition 2026</p>
    <p>Designed with ❤️ for our community celebration</p>
</footer>

<img src="images/durga1.jpg">
<img src="images/durga2.jpg">
<img src="images/stage.jpg">

</body>
</html>
